name: Deploy Docs

on:
  push:
    branches: [main]
    paths: ['book/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Build
        run: mdbook build book

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/build

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
