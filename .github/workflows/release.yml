name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x86:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Download models
        run: bash scripts/download-models.sh
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package
        run: tar czf prx-x86_64-unknown-linux-gnu.tar.gz -C target/x86_64-unknown-linux-gnu/release prx
      - uses: actions/upload-artifact@v4
        with:
          name: prx-x86_64-unknown-linux-gnu
          path: prx-x86_64-unknown-linux-gnu.tar.gz

  build-linux-arm:
    name: Linux aarch64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross
        run: cargo install cross
      - name: Download models
        run: bash scripts/download-models.sh
      - name: Build
        run: cross build --release --target aarch64-unknown-linux-gnu
      - name: Package
        run: tar czf prx-aarch64-unknown-linux-gnu.tar.gz -C target/aarch64-unknown-linux-gnu/release prx
      - uses: actions/upload-artifact@v4
        with:
          name: prx-aarch64-unknown-linux-gnu
          path: prx-aarch64-unknown-linux-gnu.tar.gz

  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Download models
        run: bash scripts/download-models.sh
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Package
        run: tar czf prx-aarch64-apple-darwin.tar.gz -C target/aarch64-apple-darwin/release prx
      - uses: actions/upload-artifact@v4
        with:
          name: prx-aarch64-apple-darwin
          path: prx-aarch64-apple-darwin.tar.gz

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Download models
        run: bash scripts/download-models.sh
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        run: 7z a prx-x86_64-pc-windows-msvc.zip target/x86_64-pc-windows-msvc/release/prx.exe
      - uses: actions/upload-artifact@v4
        with:
          name: prx-x86_64-pc-windows-msvc
          path: prx-x86_64-pc-windows-msvc.zip

  create-release:
    name: Create Release
    needs: [build-linux-x86, build-linux-arm, build-macos-arm, build-windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List available binaries
        run: ls -lh artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## prx ${{ github.ref_name }}

            Download the binary for your platform. No dependencies required.

            | Platform | File |
            |---|---|
            | Linux x86_64 | `prx-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux aarch64 | `prx-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS Apple Silicon | `prx-aarch64-apple-darwin.tar.gz` |
            | Windows x86_64 | `prx-x86_64-pc-windows-msvc.zip` |

            > Some binaries may be absent if a build timed out. Build from source: `git clone https://github.com/civitas-io/prx && cd prx && make setup && make release`
