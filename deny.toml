# cargo-deny configuration for prx
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
unmaintained = "workspace"
yanked = "warn"
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is feature-complete; migration to postcard planned for v0.5.0" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "ISC",
    "Unlicense",
    "Zlib",
    "Unicode-3.0",
    "BSD-2-Clause",
    "OpenSSL",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
