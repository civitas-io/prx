<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="720" height="420" fill="#fafafa" rx="8"/>

  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">Token Savings by Feature</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#888">Measured on production codebases across real agent sessions</text>

  <line x1="220" y1="365" x2="680" y2="365" stroke="#e0e0e0" stroke-width="1"/>
  <text x="220" y="380" text-anchor="middle" font-size="10" fill="#999">0%</text>
  <line x1="335" y1="68" x2="335" y2="365" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="335" y="380" text-anchor="middle" font-size="10" fill="#999">25%</text>
  <line x1="450" y1="68" x2="450" y2="365" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="450" y="380" text-anchor="middle" font-size="10" fill="#999">50%</text>
  <line x1="565" y1="68" x2="565" y2="365" stroke="#f0f0f0" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="565" y="380" text-anchor="middle" font-size="10" fill="#999">75%</text>
  <line x1="680" y1="68" x2="680" y2="365" stroke="#e0e0e0" stroke-width="1"/>
  <text x="680" y="380" text-anchor="middle" font-size="10" fill="#999">100%</text>

  <text x="215" y="92" text-anchor="end" font-size="12" fill="#333">--if-changed</text>
  <text x="215" y="104" text-anchor="end" font-size="9" fill="#888">re-read unchanged</text>
  <rect x="220" y="78" width="455" height="32" rx="4" fill="#1e8e3e"/>
  <text x="682" y="99" font-size="12" font-weight="700" fill="#1e8e3e">99%</text>

  <text x="215" y="134" text-anchor="end" font-size="12" fill="#333">--mode diff</text>
  <text x="215" y="146" text-anchor="end" font-size="9" fill="#888">no changes vs HEAD</text>
  <rect x="220" y="120" width="455" height="32" rx="4" fill="#1e8e3e"/>
  <text x="682" y="141" font-size="12" font-weight="700" fill="#1e8e3e">99%</text>

  <text x="215" y="176" text-anchor="end" font-size="12" fill="#333">--mode diff</text>
  <text x="215" y="188" text-anchor="end" font-size="9" fill="#888">file with changes</text>
  <rect x="220" y="162" width="451" height="32" rx="4" fill="#1e8e3e"/>
  <text x="682" y="183" font-size="12" font-weight="700" fill="#1e8e3e">98%</text>

  <text x="215" y="218" text-anchor="end" font-size="12" fill="#333">prx run</text>
  <text x="215" y="230" text-anchor="end" font-size="9" fill="#888">passing test suites</text>
  <rect x="220" y="204" width="437" height="32" rx="4" fill="#34a853"/>
  <text x="682" y="225" font-size="12" font-weight="700" fill="#1e8e3e">95%</text>

  <text x="215" y="260" text-anchor="end" font-size="12" fill="#333">--skeleton</text>
  <text x="215" y="272" text-anchor="end" font-size="9" fill="#888">signatures only</text>
  <rect x="220" y="246" width="414" height="32" rx="4" fill="#34a853"/>
  <text x="682" y="267" font-size="12" font-weight="700" fill="#34a853">90%</text>

  <text x="215" y="302" text-anchor="end" font-size="12" fill="#333">--mode entropy</text>
  <text x="215" y="314" text-anchor="end" font-size="9" fill="#888">generated code</text>
  <rect x="220" y="288" width="396" height="32" rx="4" fill="#34a853"/>
  <text x="682" y="309" font-size="12" font-weight="700" fill="#34a853">86%</text>

  <text x="215" y="344" text-anchor="end" font-size="12" fill="#333">--mode aggressive</text>
  <text x="215" y="356" text-anchor="end" font-size="9" fill="#888">strip comments</text>
  <rect x="220" y="330" width="87" height="32" rx="4" fill="#34a853"/>
  <text x="314" y="351" font-size="12" font-weight="700" fill="#34a853">19%</text>

  <rect x="100" y="395" width="520" height="1" fill="#e0e0e0"/>
  <text x="360" y="413" text-anchor="middle" font-size="11" fill="#888">36,000+ tokens saved across 200+ measured calls</text>
</svg>
