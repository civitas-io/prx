name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: prx
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: prx
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: prx
          - os: macos-13
            target: x86_64-apple-darwin
            binary: prx
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: prx.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross

      - name: Download models
        run: bash scripts/download-models.sh

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.binary }}" = "prx.exe" ]; then
            7z a ../../../prx-${{ matrix.target }}.zip ${{ matrix.binary }}
          else
            tar czf ../../../prx-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prx-${{ matrix.target }}
          path: prx-${{ matrix.target }}.*

  create-release:
    name: Create Release
    needs: build-release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List available binaries
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
          body: |
            ## prx ${{ github.ref_name }}

            Download the binary for your platform and run it. No dependencies required.

            | Platform | File |
            |---|---|
            | Linux x86_64 | `prx-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux aarch64 | `prx-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS Apple Silicon | `prx-aarch64-apple-darwin.tar.gz` |
            | macOS Intel | `prx-x86_64-apple-darwin.tar.gz` |
            | Windows x86_64 | `prx-x86_64-pc-windows-msvc.zip` |

            Some platform binaries may be missing if the build timed out. Check back later or build from source: `git clone && make setup && make release`
