name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux-x86:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package
        run: tar czf prx-x86_64-unknown-linux-gnu.tar.gz -C target/x86_64-unknown-linux-gnu/release prx
      - uses: actions/upload-artifact@v7
        with:
          name: prx-x86_64-unknown-linux-gnu
          path: prx-x86_64-unknown-linux-gnu.tar.gz

  build-linux-arm:
    name: Linux aarch64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross
        run: cargo install cross
      - name: Build
        run: cross build --release --target aarch64-unknown-linux-gnu
      - name: Package
        run: tar czf prx-aarch64-unknown-linux-gnu.tar.gz -C target/aarch64-unknown-linux-gnu/release prx
      - uses: actions/upload-artifact@v7
        with:
          name: prx-aarch64-unknown-linux-gnu
          path: prx-aarch64-unknown-linux-gnu.tar.gz

  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Package
        run: tar czf prx-aarch64-apple-darwin.tar.gz -C target/aarch64-apple-darwin/release prx
      - uses: actions/upload-artifact@v7
        with:
          name: prx-aarch64-apple-darwin
          path: prx-aarch64-apple-darwin.tar.gz

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        run: 7z a prx-x86_64-pc-windows-msvc.zip target/x86_64-pc-windows-msvc/release/prx.exe
      - uses: actions/upload-artifact@v7
        with:
          name: prx-x86_64-pc-windows-msvc
          path: prx-x86_64-pc-windows-msvc.zip

  create-release:
    name: Create Release
    needs: [build-linux-x86, build-linux-arm, build-macos-arm, build-windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List available binaries
        run: ls -lh artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '1d;$d')
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}. See CHANGELOG.md for details."
          fi
          echo "RELEASE_NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          body: |
            ${{ steps.notes.outputs.RELEASE_NOTES }}

            ---

            ## Install

            Download the binary for your platform. No dependencies required.

            | Platform | File |
            |---|---|
            | Linux x86_64 | `prx-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux aarch64 | `prx-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS Apple Silicon | `prx-aarch64-apple-darwin.tar.gz` |
            | Windows x86_64 | `prx-x86_64-pc-windows-msvc.zip` |

            > Build from source: `git clone https://github.com/civitas-io/prx && cd prx && cargo build --release`

  publish-crate:
    name: Publish to crates.io
    needs: [build-linux-x86, build-linux-arm, build-macos-arm, build-windows]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: create-release
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compute SHA256 hashes
        id: hashes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/civitas-io/prx/releases/download/${GITHUB_REF_NAME}"

          DARWIN_SHA=$(curl -sL "${BASE}/prx-aarch64-apple-darwin.tar.gz" | sha256sum | cut -d' ' -f1)
          LINUX_X86_SHA=$(curl -sL "${BASE}/prx-x86_64-unknown-linux-gnu.tar.gz" | sha256sum | cut -d' ' -f1)
          LINUX_ARM_SHA=$(curl -sL "${BASE}/prx-aarch64-unknown-linux-gnu.tar.gz" | sha256sum | cut -d' ' -f1)

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "darwin_sha=${DARWIN_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux_x86_sha=${LINUX_X86_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux_arm_sha=${LINUX_ARM_SHA}" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          cat > prx.rb << 'FORMULA'
          class Prx < Formula
            desc "Agent-native Unix tools for AI coding agents"
            homepage "https://github.com/civitas-io/prx"
            version "${{ steps.hashes.outputs.version }}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/civitas-io/prx/releases/download/v${{ steps.hashes.outputs.version }}/prx-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin_sha }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/civitas-io/prx/releases/download/v${{ steps.hashes.outputs.version }}/prx-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_x86_sha }}"
              end
              on_arm do
                url "https://github.com/civitas-io/prx/releases/download/v${{ steps.hashes.outputs.version }}/prx-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux_arm_sha }}"
              end
            end

            def install
              bin.install "prx"
            end

            test do
              assert_match "prx", shell_output("#{bin}/prx --version")
            end
          end
          FORMULA
          sed -i 's/^          //' prx.rb

      - name: Push to homebrew-tap
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/civitas-io/homebrew-tap.git tap
          cp prx.rb tap/Formula/prx.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/prx.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "prx ${{ steps.hashes.outputs.version }}"
          git push
